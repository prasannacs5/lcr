name: lcr
runtime: python
command:
  - "uvicorn"
  - "backend.main:app"
  - "--host"
  - "0.0.0.0"
  - "--port"
  - "8000"


# For chat (serving endpoint) auth on Apps, also set in the app's environment:
# DATABRICKS_HOST, DATABRICKS_CLIENT_ID, DATABRICKS_CLIENT_SECRET (service principal OAuth).
# Do not commit client secret; use Databricks Apps secrets / env configuration.
env:
  - name: "DATABRICKS_APP_APPLICATION_ID"
    value: "e03d6113-c751-494f-ac59-26b07e7fb69e"
  - name: "DATABRICKS_HOST"
    value: "https://e2-demo-field-eng.cloud.databricks.com/"
  - name: "DATABRICKS_CLIENT_ID"
    value: "e03d6113-c751-494f-ac59-26b07e7fb69e"
  - name: "DATABRICKS_CLIENT_SECRET"
    value: "<YOUR_CLIENT_SECRET>"
