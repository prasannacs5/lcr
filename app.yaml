name: lcr
runtime: python
command:
  - "uvicorn"
  - "backend.main:app"
  - "--host"
  - "0.0.0.0"
  - "--port"
  - "8000"
env:
  # Required: SQL warehouse ID for this workspace
  - name: DATABRICKS_WAREHOUSE_ID
    value: "<sql-warehouse-id>"
  # Required: Name of the model serving endpoint for the LCR agent
  - name: LCR_CHAT_ENDPOINT_NAME
    value: "lcr-agent-endpoint-v4"
  # Optional: Foundation model for executive summary (must exist on workspace)
  - name: DATABRICKS_SUMMARY_MODEL
    value: "databricks-gemini-2-5-pro"
  # Optional: Override catalog/schema if tables live elsewhere
  # - name: LCR_CATALOG
  #   value: "cfo"
  # - name: LCR_SCHEMA
  #   value: "aura_bank"
